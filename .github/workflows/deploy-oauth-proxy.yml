name: Deploy OAuth Proxy

on:
  push:
    branches: [main]
    paths:
      - 'oauth-proxy/**'
      - 'infra/**'
      - '.github/workflows/deploy-oauth-proxy.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'production'
        type: choice
        options:
          - staging
          - production
      enable_network_isolation:
        description: 'Enable VNet + private endpoints'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

permissions:
  id-token: write
  contents: read

env:
  AZURE_LOCATION: ${{ vars.AZURE_LOCATION || 'eastus2' }}

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: oauth-proxy
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: dotnet test --configuration Release
        working-directory: oauth-proxy.Tests

      - name: Publish
        run: dotnet publish --no-build --configuration Release --output ./publish

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: oauth-proxy
          path: oauth-proxy/publish/

  deploy-staging:
    name: Deploy to Staging
    needs: build
    runs-on: ubuntu-latest
    environment: staging
    env:
      ENVIRONMENT: staging
      RESOURCE_GROUP: rg-djai-staging
      ENABLE_NETWORK_ISOLATION: ${{ github.event.inputs.enable_network_isolation || 'true' }}
    steps:
      - uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Validate Bicep
        run: az bicep build --file infra/main.bicep --stdout > /dev/null

      - name: Provision infrastructure
        run: |
          az deployment group create \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --template-file infra/main.bicep \
            --parameters environmentName=${{ env.ENVIRONMENT }} \
            --parameters "allowedRedirectHosts=${{ vars.ALLOWED_REDIRECT_HOSTS || '' }}" \
            --parameters enableNetworkIsolation=${{ env.ENABLE_NETWORK_ISOLATION }} \
            --name "djai-${{ env.ENVIRONMENT }}-$(date +%Y%m%d-%H%M%S)" \
            --mode Incremental

      - name: Get Function App name
        id: get-app
        run: |
          APP_NAME=$(az deployment group show \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --name "$(az deployment group list --resource-group ${{ env.RESOURCE_GROUP }} --query '[0].name' -o tsv)" \
            --query 'properties.outputs.AZURE_FUNCTION_APP_NAME.value' -o tsv)
          echo "app_name=$APP_NAME" >> "$GITHUB_OUTPUT"

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: oauth-proxy
          path: ./publish

      - name: Install Azure Functions Core Tools
        run: npm install -g azure-functions-core-tools@4 --unsafe-perm true

      - name: Deploy application
        run: |
          cd oauth-proxy
          func azure functionapp publish ${{ steps.get-app.outputs.app_name }} --dotnet-isolated

  deploy-production:
    name: Deploy to Production
    needs: deploy-staging
    runs-on: ubuntu-latest
    if: github.event.inputs.environment == 'production'
    environment: production  # Requires approval
    env:
      ENVIRONMENT: production
      RESOURCE_GROUP: rg-djai-prod
      ENABLE_NETWORK_ISOLATION: 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Provision infrastructure
        run: |
          az deployment group create \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --template-file infra/main.bicep \
            --parameters environmentName=${{ env.ENVIRONMENT }} \
            --parameters "allowedRedirectHosts=${{ vars.ALLOWED_REDIRECT_HOSTS || '' }}" \
            --parameters enableNetworkIsolation=${{ env.ENABLE_NETWORK_ISOLATION }} \
            --name "djai-${{ env.ENVIRONMENT }}-$(date +%Y%m%d-%H%M%S)" \
            --mode Incremental

      - name: Get Function App name
        id: get-app
        run: |
          APP_NAME=$(az deployment group show \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --name "$(az deployment group list --resource-group ${{ env.RESOURCE_GROUP }} --query '[0].name' -o tsv)" \
            --query 'properties.outputs.AZURE_FUNCTION_APP_NAME.value' -o tsv)
          echo "app_name=$APP_NAME" >> "$GITHUB_OUTPUT"

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: oauth-proxy
          path: ./publish

      - name: Install Azure Functions Core Tools
        run: npm install -g azure-functions-core-tools@4 --unsafe-perm true

      - name: Deploy application
        run: |
          cd oauth-proxy
          func azure functionapp publish ${{ steps.get-app.outputs.app_name }} --dotnet-isolated
