name: Deploy OAuth Proxy

on:
  push:
    branches: [main]
    paths:
      - 'oauth-proxy/**'
      - 'infra/**'
      - '.github/workflows/deploy-oauth-proxy.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'production'
        type: choice
        options:
          - staging
          - production

permissions:
  id-token: write
  contents: read

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: oauth-proxy
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Publish
        run: dotnet publish --no-build --configuration Release --output ./publish

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: oauth-proxy
          path: oauth-proxy/publish/

  deploy-staging:
    name: Deploy to Staging
    needs: build
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Install azd
        uses: Azure/setup-azd@v2

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set azd environment
        run: |
          azd env new staging --no-prompt
          azd env set AZURE_LOCATION ${{ vars.AZURE_LOCATION || 'eastus2' }}
          # ALLOWED_REDIRECT_HOSTS must be set as a GitHub repository variable for production deployments
          azd env set ALLOWED_REDIRECT_HOSTS "${{ vars.ALLOWED_REDIRECT_HOSTS || '' }}"

      - name: Provision infrastructure
        run: azd provision --no-prompt
        env:
          AZURE_ENV_NAME: staging

      - name: Deploy application
        run: azd deploy --no-prompt
        env:
          AZURE_ENV_NAME: staging

  deploy-production:
    name: Deploy to Production
    needs: deploy-staging
    runs-on: ubuntu-latest
    if: github.event.inputs.environment == 'production'
    environment: production  # Requires approval
    steps:
      - uses: actions/checkout@v4

      - name: Install azd
        uses: Azure/setup-azd@v2

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set azd environment
        run: |
          azd env new production --no-prompt
          azd env set AZURE_LOCATION ${{ vars.AZURE_LOCATION || 'eastus2' }}
          # ALLOWED_REDIRECT_HOSTS must be set as a GitHub repository variable for production deployments
          azd env set ALLOWED_REDIRECT_HOSTS "${{ vars.ALLOWED_REDIRECT_HOSTS || '' }}"

      - name: Provision infrastructure
        run: azd provision --no-prompt
        env:
          AZURE_ENV_NAME: production

      - name: Deploy application
        run: azd deploy --no-prompt
        env:
          AZURE_ENV_NAME: production
